<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ppass</title>
  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #333;
      --text: #fff;
      --text2: #888;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 8px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text2); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    
    input {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 13px;
    }
    
    /* Mode Select */
    #modeSelect {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    
    #modeSelect.hidden { display: none; }
    
    .logo { font-size: 32px; font-weight: 600; letter-spacing: -1px; }
    .tagline { color: var(--text2); font-size: 14px; }
    
    .mode-cards {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }
    
    .mode-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 40px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .mode-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .mode-icon { font-size: 32px; margin-bottom: 12px; }
    .mode-title { font-weight: 600; margin-bottom: 4px; }
    .mode-desc { font-size: 12px; color: var(--text2); }
    
    /* App */
    #app { display: none; }
    #app.show { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
    #app.show { display: grid; }
    
    /* Sidebar */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
    }
    
    .nav-item:hover, .nav-item.active { background: var(--bg3); color: var(--text); }
    .nav-section { margin-bottom: 24px; }
    .nav-title { font-size: 11px; color: var(--text2); margin-bottom: 8px; padding: 0 12px; }
    
    /* Main */
    .main { display: flex; flex-direction: column; }
    
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header-title { font-weight: 500; }
    
    .content { padding: 24px; flex: 1; overflow-y: auto; }
    
    /* Panel */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    
    .panel-title {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .device-id-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }
    
    .device-id { font-family: monospace; color: var(--accent); flex: 1; }
    
    .device-list { display: flex; flex-direction: column; gap: 6px; }
    .device-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--bg3); border-radius: var(--radius); font-size: 12px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .dot.offline { background: var(--danger); }
    
    /* File Grid */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    
    .file-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    
    .file-card:hover { border-color: var(--accent); }
    
    .file-icon {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text2);
    }
    
    .file-name {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .file-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      opacity: 0;
    }
    
    .file-card:hover .file-actions { opacity: 1; }
    
    .btn-action {
      background: var(--bg3);
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      color: var(--text2);
      cursor: pointer;
    }
    
    .btn-action:hover { background: var(--border); color: var(--text); }
    
    /* Log */
    .log {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 10px;
    }
    
    .log-info { color: var(--text2); }
    .log-success { color: var(--success); }
    .log-error { color: var(--danger); }
    
    .empty { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }
    
    #app.hidden { display: none !important; }
  </style>
  <script type="module" crossorigin src="./assets/index-rrgZoDXJ.js"></script>
</head>
<body>
  <!-- Mode Select -->
  <div id="modeSelect">
    <div class="logo">ppass</div>
    <div class="tagline">Private cloud file system</div>
    <div class="mode-cards">
      <div class="mode-card" onclick="startHost()">
        <div class="mode-icon"><i class="ph ph-hard-drives"></i></div>
        <div class="mode-title">Storage</div>
        <div class="mode-desc">Share local files</div>
      </div>
      <div class="mode-card" onclick="startClient()">
        <div class="mode-icon"><i class="ph ph-device-mobile"></i></div>
        <div class="mode-title">Access</div>
        <div class="mode-desc">Access remote files</div>
      </div>
    </div>
  </div>
  
  <!-- App -->
  <div id="app" class="hidden">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo" style="margin-bottom: 24px;">ppass</div>
      
      <div class="nav-section">
        <div class="nav-title">FILES</div>
        <div class="nav-item active">
          <i class="ph ph-folder"></i>
          <span>All Files</span>
        </div>
        <div class="nav-item">
          <i class="ph ph-clock"></i>
          <span>Recent</span>
        </div>
      </div>
      
      <div class="nav-section">
        <div class="nav-title">STORAGE</div>
        <div class="nav-item">
          <i class="ph ph-hard-drive"></i>
          <span>Local</span>
        </div>
      </div>
    </div>
    
    <!-- Main -->
    <div class="main">
      <div class="header">
        <div class="header-title">All Files</div>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-ghost btn-sm" onclick="refreshFiles()"><i class="ph ph-arrow-clockwise"></i></button>
          <button class="btn btn-ghost btn-sm" onclick="reconnect()"><i class="ph ph-arrow-counter-clockwise"></i></button>
          <button class="btn btn-ghost btn-sm" onclick="clearAll()"><i class="ph ph-trash"></i></button>
        </div>
      </div>
      
      <div class="content">
        <!-- Host Panel -->
        <div class="panel" id="hostPanel">
          <div class="panel-title">
            <span><i class="ph ph-wifi-high"></i> My Device</span>
            <span class="btn btn-ghost btn-sm" onclick="selectFolder()">
              <i class="ph ph-folder-open"></i> Select Folder
            </span>
          </div>
          <div class="device-id-box">
            <span style="color: var(--text2); font-size: 12px;">ID:</span>
            <span class="device-id" id="deviceId">-</span>
            <button class="btn btn-ghost btn-sm" onclick="copyId()"><i class="ph ph-copy"></i></button>
          </div>
          <div class="panel-title">Connections (<span id="deviceCount">0</span>)</div>
          <div class="device-list" id="deviceList">
            <div class="empty">No connections</div>
          </div>
        </div>
        
        <!-- Client Panel -->
        <div class="panel" id="clientPanel" style="display: none;">
          <div class="panel-title">
            <span><i class="ph ph-link"></i> Connect</span>
          </div>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="remoteInput" placeholder="Enter device ID" style="flex: 1;">
            <button class="btn btn-primary" onclick="connectToRemote()">Connect</button>
          </div>
        </div>
        
        <!-- Files -->
        <div class="file-grid" id="fileGrid">
          <div class="empty">Select a folder to view files</div>
        </div>
        
        <!-- Log -->
        <div class="log" id="log" style="margin-top: 20px;"></div>
      </div>
    </div>
  </div>
  
</body>
</html>
