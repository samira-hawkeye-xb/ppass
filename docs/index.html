<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ppass - 跨网络文件管理</title>
  <style>
    :root {
      --primary: #007AFF;
      --primary-light: #E8F4FF;
      --bg: #F5F7FA;
      --card-bg: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #666666;
      --border: #E5E5E5;
      --success: #34C759;
      --warning: #FF9500;
      --danger: #FF3B30;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    
    /* Mode Selection */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .mode-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      background: var(--primary-light);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .mode-btn:hover {
      border-color: var(--primary);
    }
    
    .mode-btn .icon {
      font-size: 32px;
    }
    
    .mode-btn .label {
      font-weight: 600;
      color: var(--primary);
    }
    
    .mode-btn .desc {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }
    
    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .status.online { background: #E8F8F0; color: #1D7A44; }
    .status.offline { background: #FFF0F0; color: #C73E3A; }
    .status.connecting { background: #FFF8E6; color: #996600; }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    
    /* Device Info */
    .device-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--primary-light);
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .device-id {
      font-family: monospace;
      font-size: 13px;
      color: var(--primary);
      background: white;
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    /* QR Code */
    .qr-section {
      text-align: center;
      padding: 20px;
    }
    
    .qr-section h3 {
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    #qrcode {
      display: inline-block;
      padding: 12px;
      background: white;
      border-radius: 8px;
    }
    
    /* Device List */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .device-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
    }
    
    .device-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    
    .device-status.offline {
      background: var(--danger);
    }
    
    /* File List */
    .file-list {
      display: flex;
      flex-direction: column;
    }
    
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    .file-item:last-child {
      border-bottom: none;
    }
    
    .file-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .file-icon {
      font-size: 20px;
    }
    
    .file-name {
      font-size: 14px;
    }
    
    .btn {
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .btn:hover {
      opacity: 0.9;
    }
    
    .btn-secondary {
      background: var(--success);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    /* Input */
    .input-group {
      display: flex;
      gap: 8px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    /* Empty */
    .empty-tip {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
    
    /* Hidden */
    .hidden {
      display: none !important;
    }
    
    /* Log */
    .log {
      background: #1E1E1E;
      color: #00FF00;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
    }
    
    /* Folder Selected */
    .folder-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--success);
      color: white;
      border-radius: 20px;
      font-size: 13px;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-B_UjANnz.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">☁️ ppass</div>
      <div class="tagline">把闲置电脑变成私有云</div>
    </div>
    
    <!-- Mode Selection -->
    <div class="card" id="modeCard">
      <div class="mode-grid">
        <button class="mode-btn" onclick="startAsHost()">
          <span class="icon">🖥️</span>
          <span class="label">存储端</span>
          <span class="desc">共享文件给他人</span>
        </button>
        <button class="mode-btn" onclick="startAsClient()">
          <span class="icon">📱</span>
          <span class="label">访问端</span>
          <span class="desc">访问远程文件</span>
        </button>
      </div>
    </div>
    
    <!-- Host Panel -->
    <div class="card hidden" id="hostPanel">
      <div class="status offline" id="hostStatus">
        <span class="status-dot"></span>
        <span>初始化中...</span>
      </div>
      
      <div class="device-info">
        <span>我的设备ID:</span>
        <span class="device-id" id="peerId">-</span>
      </div>
      
      <!-- QR Code -->
      <div class="qr-section" id="qrSection">
        <h3>📱 扫码访问我的文件</h3>
        <div id="qrcode"></div>
      </div>
      
      <!-- Folder -->
      <div style="margin-top: 16px;">
        <button class="btn btn-secondary" onclick="selectFolder()">📂 选择共享文件夹</button>
        <span id="selectedFolder"></span>
      </div>
      
      <!-- Connected Devices -->
      <div style="margin-top: 20px;">
        <div class="section-title">
          <span>已连接设备 (<span id="deviceCount">0</span>)</span>
          <button class="btn btn-sm btn-outline" onclick="refreshFiles()">🔄 刷新</button>
        </div>
        <div class="device-list" id="deviceList">
          <div class="empty-tip">等待设备连接...</div>
        </div>
      </div>
    </div>
    
    <!-- Client Panel -->
    <div class="card hidden" id="clientPanel">
      <div class="status offline" id="clientStatus">
        <span class="status-dot"></span>
        <span>初始化中...</span>
      </div>
      
      <!-- Connection -->
      <div id="clientSetup">
        <div class="input-group">
          <input type="text" id="remotePeerId" placeholder="输入设备ID">
          <button class="btn" onclick="connectToPeer()">连接</button>
        </div>
      </div>
      
      <div id="clientConnected" class="hidden">
        <div class="status online" id="connectionStatus">
          <span class="status-dot"></span>
          <span>已连接</span>
        </div>
        <div style="margin-top: 12px;">
          <button class="btn btn-secondary" onclick="refreshFiles()">🔄 刷新文件</button>
        </div>
      </div>
    </div>
    
    <!-- File Browser -->
    <div class="card hidden" id="fileBrowser">
      <div class="section-title">
        <span>📁 文件列表</span>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
    
    <!-- Log -->
    <div class="card">
      <div class="section-title">📋 日志</div>
      <div class="log" id="log"></div>
    </div>
  </div>
  
</body>
</html>
