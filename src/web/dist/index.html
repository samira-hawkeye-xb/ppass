<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ppass - 私有云文件管理</title>
  <style>
    /* ===== CSS Variables ===== */
    :root {
      --bg-primary: #0D0D0D;
      --bg-secondary: #1A1A1A;
      --bg-tertiary: #242424;
      --bg-hover: #2D2D2D;
      --accent: #5E9EFF;
      --accent-hover: #7BB3FF;
      --accent-muted: rgba(94, 158, 255, 0.15);
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --text-tertiary: #666666;
      --border: #333333;
      --success: #30D158;
      --warning: #FFD60A;
      --danger: #FF453A;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    
    /* ===== Layout ===== */
    .app {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    
    /* ===== Sidebar ===== */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin-bottom: 24px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #A855F7);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .logo-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    
    .nav-section {
      margin-bottom: 24px;
    }
    
    .nav-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 12px;
      margin-bottom: 8px;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 14px;
    }
    
    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    .nav-item.active {
      background: var(--accent-muted);
      color: var(--accent);
    }
    
    .nav-icon {
      font-size: 16px;
      opacity: 0.8;
    }
    
    /* ===== Main Content ===== */
    .main {
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }
    
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    
    .breadcrumb-item {
      color: var(--text-secondary);
    }
    
    .breadcrumb-item.active {
      color: var(--text-primary);
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
    }
    
    /* ===== Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      border: none;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--bg-hover);
    }
    
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    
    .btn-ghost:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    /* ===== File Grid ===== */
    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    
    .file-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .file-card:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    
    .file-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }
    
    .file-icon.folder {
      background: rgba(255, 214, 10, 0.15);
    }
    
    .file-icon.image {
      background: rgba(48, 209, 88, 0.15);
    }
    
    .file-icon.doc {
      background: rgba(94, 158, 255, 0.15);
    }
    
    .file-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    
    .file-meta {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    /* ===== Connection Panel ===== */
    .connection-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .connection-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    
    .status-dot.offline {
      background: var(--danger);
    }
    
    .device-id-box {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .device-id-label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .device-id-value {
      font-family: 'SF Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      flex: 1;
    }
    
    .device-id-copy {
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
    }
    
    .device-id-copy:hover {
      color: var(--text-primary);
    }
    
    /* ===== QR Code ===== */
    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }
    
    .qr-container canvas {
      border-radius: var(--radius-sm);
    }
    
    .qr-hint {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    /* ===== Device List ===== */
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .device-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }
    
    .device-item .status-dot {
      width: 6px;
      height: 6px;
    }
    
    .device-name {
      flex: 1;
      font-size: 13px;
    }
    
    .device-peer {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: monospace;
    }
    
    /* ===== Log ===== */
    .log-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-top: auto;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .log-entry {
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 2px 0;
    }
    
    .log-entry.error { color: var(--danger); }
    .log-entry.success { color: var(--success); }
    .log-entry.info { color: var(--accent); }
    
    /* ===== Empty State ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .empty-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    /* ===== Mode Selection ===== */
    .mode-selection {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }
    
    .mode-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), #A855F7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .mode-subtitle {
      color: var(--text-secondary);
      margin-bottom: 40px;
    }
    
    .mode-cards {
      display: grid;
      grid-template-columns: repeat(2, 200px);
      gap: 20px;
    }
    
    .mode-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .mode-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(94, 158, 255, 0.15);
    }
    
    .mode-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
    
    .mode-label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .mode-desc {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    /* ===== Hidden ===== */
    .hidden { display: none !important; }
    
    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DQUPIrVA.js"></script>
</head>
<body>
  <!-- Mode Selection -->
  <div class="mode-selection" id="modeSelection">
    <div class="mode-title">☁️ ppass</div>
    <div class="mode-subtitle">把闲置电脑变成私有云</div>
    <div class="mode-cards">
      <div class="mode-card" onclick="startAsHost()">
        <div class="mode-icon">🖥️</div>
        <div class="mode-label">存储端</div>
        <div class="mode-desc">共享文件给他人访问</div>
      </div>
      <div class="mode-card" onclick="startAsClient()">
        <div class="mode-icon">📱</div>
        <div class="mode-label">访问端</div>
        <div class="mode-desc">访问远程设备文件</div>
      </div>
    </div>
  </div>
  
  <!-- App -->
  <div class="app hidden" id="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <div class="logo-icon">☁️</div>
        <div class="logo-text">ppass</div>
      </div>
      
      <div class="nav-section">
        <div class="nav-title">文件</div>
        <div class="nav-item active">
          <span class="nav-icon">📁</span>
          <span>全部文件</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">🕐</span>
          <span>最近</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">⭐</span>
          <span>收藏</span>
        </div>
      </div>
      
      <div class="nav-section">
        <div class="nav-title">存储</div>
        <div class="nav-item">
          <span class="nav-icon">💾</span>
          <span id="storageInfo">本地存储</span>
        </div>
      </div>
    </div>
    
    <!-- Main -->
    <div class="main">
      <!-- Header -->
      <div class="header">
        <div class="breadcrumb">
          <span class="breadcrumb-item active">全部文件</span>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost" onclick="refreshFiles()">🔄</button>
          <button class="btn btn-primary" onclick="selectFolder()" id="selectFolderBtn">
            📂 选择文件夹
          </button>
        </div>
      </div>
      
      <!-- Content -->
      <div class="content">
        <!-- Connection Panel (Host) -->
        <div class="connection-panel hidden" id="hostPanel">
          <div class="connection-header">
            <div class="connection-status">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusText">在线</span>
            </div>
            <span style="color: var(--text-secondary); font-size: 12px;">存储端</span>
          </div>
          
          <div class="device-id-box">
            <span class="device-id-label">设备ID</span>
            <span class="device-id-value" id="peerId">-</span>
            <span class="device-id-copy" onclick="copyPeerId()">📋</span>
          </div>
          
          <div class="qr-container" id="qrContainer">
            <canvas id="qrcode"></canvas>
            <span class="qr-hint">扫码访问我的文件</span>
          </div>
          
          <div style="margin-top: 20px;">
            <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;">
              已连接设备 (<span id="deviceCount">0</span>)
            </div>
            <div class="device-list" id="deviceList">
              <div class="empty-state" style="padding: 20px;">
                <div class="empty-desc">等待设备连接...</div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Connection Panel (Client) -->
        <div class="connection-panel hidden" id="clientPanel">
          <div class="connection-header">
            <div class="connection-status">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusText">未连接</span>
            </div>
          </div>
          
          <div class="input-group" style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="remotePeerId" placeholder="输入设备ID" 
              style="flex:1; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-primary); font-size: 14px;">
            <button class="btn btn-primary" onclick="connectToPeer()">连接</button>
          </div>
          
          <div id="clientConnected" class="hidden">
            <div class="device-id-box">
              <span class="device-id-label">已连接</span>
              <span class="device-id-value" id="connectedHost">-</span>
            </div>
          </div>
        </div>
        
        <!-- File Grid -->
        <div id="fileBrowser">
          <div class="file-grid" id="fileGrid">
            <div class="empty-state" id="emptyState">
              <div class="empty-icon">📂</div>
              <div class="empty-title">暂无文件</div>
              <div class="empty-desc">选择文件夹后，文件将显示在这里</div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Log -->
      <div class="log-panel">
        <div id="log"></div>
      </div>
    </div>
  </div>
  
</body>
</html>
